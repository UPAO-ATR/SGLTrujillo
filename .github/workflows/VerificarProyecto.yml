name: Verificar proyecto

on:
  push:
    branches: [main]
  pull_request:

jobs:
  servidor:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Servidor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: Servidor/.node-version
          cache: npm
          cache-dependency-path: Servidor/package-lock.json
      - run: npm ci
      - run: npm test

  cliente:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Cliente
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: Cliente/.node-version
          cache: npm
          cache-dependency-path: Cliente/package-lock.json
      - run: npm ci
      - run: npm test
      - run: npm run construir