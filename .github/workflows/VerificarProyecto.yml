name: Verificar proyecto

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            Servidor/package-lock.json
            Cliente/package-lock.json
      - run: npm ci --include=dev
      - run: npm --prefix Servidor ci
      - run: npm --prefix Cliente ci
      - run: npm run probar
      - run: npm run construir
