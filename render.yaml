services:
  - type: web
    name: sgl-trujillo-flujo-corregido
    runtime: node
    plan: free
    region: oregon
    branch: main
    buildCommand: npm ci --include=dev && npm run instalarProduccion && npm run construir
    startCommand: npm run prepararEIniciar
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: MODO_DEMOSTRACION
        value: true
      - key: MONTO_COBRO_FLUJO_CORREGIDO
        value: 3
      - key: ZONA_HORARIA
        value: America/Lima
      - key: ESQUEMA_BASE_DATOS
        value: sgl_flujo_corregido
      - key: URL_BASE_DATOS
        sync: false
      - key: CLAVE_JWT
        generateValue: true
      - key: CODART_TOKEN
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: CORREO_REMITENTE
        sync: false
      - key: NOMBRE_REMITENTE
        value: SGL Trujillo
      - key: GCS_NOMBRE_BUCKET
        sync: false
      - key: GCS_PROYECTO_ID
        sync: false
      - key: GCS_CORREO_CLIENTE
        sync: false
      - key: GCS_CLAVE_PRIVADA
        sync: false
